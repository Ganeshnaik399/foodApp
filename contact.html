<div class="container"> 
    <h2>Contact Us</h2>
     <form onsubmit="return validateForm()">
         <input type="text" id="name" placeholder="Full Name" required> 
         <input type="email" id="email" placeholder="Email Address" required> 
         <input type="text" id="mobile" placeholder="+91 9876543210" required>
          <textarea id="query" placeholder="Your Query..." required></textarea>
           <button type="submit">Submit</button> 
        </form> 
    <p class="success" id="successMsg">✅ Submitted Successfully!</p>
 </div>
<script>
 function validateForm(){
     let mobile = document.getElementById("mobile").value;
      if(mobile.length < 10){ alert("Enter valid mobile number");
       return false; 
    }
        document.getElementById("successMsg").style.display = "block"; 
        return false; // prevent reload 
        }
 </script>
